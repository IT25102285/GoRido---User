<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          darkMode: 'class'
        }
    </script>
    <title>GoRido Sign Up</title>
    <style>
        .signImage {
          background-image: url("/loginImage.jpg");
          height: 100%;
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
        }
    </style>
</head>
<body class="flex items-start sm:items-center justify-center min-h-screen px-4 sm:px-6 md:px-10 lg:px-16 py-10 sm:py-0 transition-colors duration-300 bg-slate-200 dark:bg-slate-950">

<!-- Container -->
<div class="grid w-full max-w-5xl grid-cols-1 overflow-hidden bg-white shadow-2xl dark:bg-slate-900 rounded-2xl md:grid-cols-2 mx-2 md:mx-auto">

    <!-- Left -->
    <div
            class="relative flex-col items-center justify-center hidden p-10 text-white signImage md:flex">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative z-10 text-center">
            <h1 class="mb-4 text-4xl font-bold">GoRido</h1>
            <p class="text-lg">Your smart taxi partner. Fast, safe & reliable
                rides anytime.</p>
        </div>
    </div>

    <!-- Right -->
    <div class="p-8 md:p-12">
        <h2
                class="mb-6 text-3xl font-bold text-slate-800 dark:text-white">Create
            Account</h2>
        <form onsubmit="signup(event)" class="space-y-5" novalidate>

            <!-- First Last Name -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        First Name
                    </label>
                    <input id="fname" name="fname" type="text" placeholder="Enter first name"
                           class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        Last Name
                    </label>
                    <input id="lname" name="lname" type="text" placeholder="Enter last name"
                           class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

            </div>

            <!-- Email -->
            <div>
                <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <!-- Phone -->
                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Phone Number</label>
                    <input id="mobile" name="mobile" type="tel" placeholder="Enter contact number"
                        class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

                <!-- Gender -->
                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        Gender
                    </label>

                    <select id="gender" name="gender"
                            class="w-full px-4 py-3 border border-transparent rounded-lg
               bg-slate-200 dark:bg-slate-800
               text-slate-900 dark:text-white
               focus:outline-none focus:ring-2 focus:ring-yellow-400
               appearance-none">

                        <option value="" selected>Select gender</option>

                    </select>
                </div>

            </div>

            <!-- Password -->
            <div>
                <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Password</label>
                <input id="password" name="password" type="password" placeholder="Create a password"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Confirm Password</label>
                <input id="cpassword" name="cpassword" type="password" placeholder="Confirm your password"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Terms -->
            <div class="flex items-start text-sm text-slate-600 dark:text-slate-300">
                <input type="checkbox" checked class="mt-1 mr-2 accent-yellow-400">
                <span>I agree to the <a href="#" class="text-yellow-400 hover:underline">Terms & Conditions</a></span>
            </div>

            <p id="msg"class="text-sm text-center hidden mt-3 text-red-600"></p>

            <!-- Submit -->
            <button type="submit"
                    class="w-full py-3 font-semibold text-black transition bg-yellow-400 rounded-lg hover:bg-yellow-300">
                Sign Up
            </button>

            <p class="mt-4 text-sm text-center text-slate-500 dark:text-slate-400">
                Already have an account?
                <a href="/signin"
                   class="text-yellow-500 hover:underline">
                    Sign In
                </a>
            </p>

        </form>
    </div>

</div>

<script>
    window.onload = function () {
        loadGender();
    };
</script>

<script src="/Js/signup.js"></script>
</body>
</html>
