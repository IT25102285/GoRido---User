<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
          darkMode: 'class'
        }
    </script>
    <title>GoRido Sign In</title>
    <style>
        .signImage {
          background-image: url("/loginImage.jpg");
          height: 100%;
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen px-4 sm:px-6 md:px-10 lg:px-16 transition-colors duration-300 bg-slate-200 dark:bg-slate-950">

<!-- Container -->
<div class="grid w-full max-w-5xl grid-cols-1 overflow-hidden transition-colors duration-300 bg-white shadow-2xl dark:bg-slate-900 rounded-2xl md:grid-cols-2">

    <!-- Left -->
    <div class="relative flex-col items-center justify-center hidden p-10 text-white signImage md:flex">

        <div class="absolute inset-0 bg-black/50"></div>

        <div class="relative z-10 text-center">
            <h1 class="mb-4 text-4xl font-bold">GoRido</h1>
            <p class="text-lg">Your smart taxi partner. Fast, safe & reliable
                rides anytime.</p>
        </div>

    </div>

    <!-- Right -->
    <div class="p-8 md:p-12">
        <h2 class="mb-6 text-3xl font-bold text-slate-800 dark:text-white">Sign In</h2>

        <form onsubmit="signin(event)" class="space-y-5" novalidate>

            <!-- Email -->
            <div>
                <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Email</label>
                <input id="login_email" name="email" type="email" placeholder="you@example.com"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Password -->
            <div>
                <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Password</label>
                <input id="login_password" name="password" type="password" placeholder="Enter your password"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Remember Forgot -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600 dark:text-slate-300">
                    <input type="checkbox" class="mr-2 accent-yellow-400"> Remember me
                </label>
                <a href="#" onclick="openModal()" class="text-yellow-500 hover:underline">Forgot
                    password?</a>
            </div>

            <p id="msg"class="text-sm text-center hidden mt-3 text-red-600"></p>

            <!-- SignIn Buttn -->
            <button type="submit" class="w-full py-3 font-semibold text-black transition bg-yellow-400 rounded-lg hover:bg-yellow-300">Sign In</button>

            <!-- SignUp -->
            <p class="mt-4 text-sm text-center text-slate-500 dark:text-slate-400">
                Don’t have an account?
                <a href="/signup" class="text-yellow-500 hover:underline">Sign up</a>
            </p>

        </form>
    </div>

</div>

<!-- Reset Password Modal -->
<div id="reset-modal"
     class="hidden fixed inset-0 z-50 flex items-center justify-center">

    <!-- Bg Blur -->
    <div id="modal-overlay"
         class="absolute inset-0 bg-black/60 backdrop-blur-sm">
    </div>

    <!-- MODAL -->
    <div id="modal-box"
         class="relative w-full max-w-md mx-4 rounded-3xl shadow-2xl
                bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl
                border border-white/20 dark:border-slate-700
                p-7 opacity-0 scale-95 transition-all duration-300">

        <div class="flex items-center justify-between mb-6">

            <div>
                <h3 class="text-2xl font-bold text-slate-800 dark:text-white">
                    Reset Password
                </h3>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                    Secure account recovery
                </p>
            </div>

            <button onclick="closeModal()"
                    class="w-9 h-9 flex items-center justify-center rounded-full
                           hover:bg-red-100 dark:hover:bg-red-500/20
                           text-slate-500 hover:text-red-500 transition">
                ✕
            </button>
        </div>

        <form class="space-y-4">

            <!-- Email -->
            <div>
                <label class="text-sm text-slate-600 dark:text-slate-300">
                    Email Address
                </label>
                <input type="email" id="reset_email"
                       class="w-full px-4 py-3 border-transparent rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400"
                       placeholder="you@example.com">
            </div>

            <p id="sendcodemsg"class="text-sm text-center hidden mt-3 text-green-600"></p>

            <div>
                <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                    Verification Code
                </label>

                <div class="flex overflow-hidden rounded-xl border border-slate-300 dark:border-slate-600
                bg-slate-100 dark:bg-slate-700">

                    <input type="text" id="code"
                           class="flex-1 px-4 py-3 bg-transparent text-slate-900 dark:text-white outline-none
                      hover:bg-slate-200 dark:hover:bg-slate-600
                      focus:bg-slate-200 dark:focus:bg-slate-600 transition"
                           placeholder="Enter code">

                    <div class="w-px bg-slate-300 dark:bg-slate-600"></div>

                    <button type="button"
                            onclick="sendCode()"
                            class="px-4 flex items-center justify-center
                       text-slate-600 dark:text-yellow-400
                       hover:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-600
                       transition">

            <span class="material-symbols-outlined text-xl leading-none">
                send
            </span>

                    </button>

                </div>
            </div>

            <!-- New Password -->
            <div>
                <label class="text-sm text-slate-600 dark:text-slate-300">
                    New Password
                </label>
                <input type="password" id="newpassword"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400"
                       placeholder="Enter new password">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="text-sm text-slate-600 dark:text-slate-300">
                    Confirm Password
                </label>
                <input type="password" id="confirmpassword"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400"
                       placeholder="Confirm password">
            </div>

            <p id="modelmsg"class="text-sm text-center hidden mt-3 text-red-600"></p>

            <div class="flex gap-3 pt-4">

                <button type="button"
                        onclick="closeModal()"
                        class="w-1/3 py-2 text-sm font-bold text-red-500
                               hover:text-red-500 hover:underline transition">
                    Cancel
                </button>

                <button type="button"
                        onclick="savePassword()"
                        class="w-2/3 py-3 font-semibold text-black
                               bg-gradient-to-r from-yellow-400 to-yellow-300
                               rounded-xl shadow-md">
                    Update Password
                </button>

            </div>

        </form>
    </div>
</div>

<script src="/Js/signin.js"></script>
</body>
</html>
