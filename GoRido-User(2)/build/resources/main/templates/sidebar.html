<!doctype html>
<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="sidebar">

    <aside
            class="hidden lg:flex w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex-col fixed h-full">

        <div class="px-8 py-6 border-b border-slate-200 dark:border-slate-800">

            <h1 class="brand text-3xl font-extrabold">

                Go<span class="text-yellow-400">Rido</span>

            </h1>

            <p class="text-xs text-slate-500 mt-1">Passenger Dashboard</p>

        </div>

        <div class="px-6 py-6">

            <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-100 dark:bg-slate-800">

                <img
                        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=80"
                        class="w-14 h-14 rounded-full object-cover border-2 border-yellow-400"
                        alt="Profile" />

                <div class="min-w-0 flex-1">

                    <h3 class="font-bold truncate">
                        <span class="capitalize" th:text="${user.first_name}"></span>
                        <span class="capitalize" th:text="${user.last_name}"></span>
                    </h3>

                    <p th:text="${user.email}"
                       class="text-xs text-slate-500 dark:text-slate-400 truncate max-w-full"
                       th:title="${user.email}">
                    </p>

                </div>

            </div>

        </div>

        <nav class="px-4 space-y-2">

            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-slate-950 font-semibold">

                <!-- Profile Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M5.121 17.804A9 9 0 1118.879 6.196a9 9 0 01-13.758 11.608zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>

                Profile
            </a>

            <a href="/bookingrequests" th:if="${user.typeId != null and user.typeId.id == 2}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">

                <!-- Booking Requests Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 5H7a2 2 0 00-2 2v2m0 0v10a2 2 0 002 2h10a2 2 0 002-2V9m-2-2V5a2 2 0 00-2-2h-2m-4 0h4m-4 0a2 2 0 00-2 2v2m6-4a2 2 0 012 2v2"/>
                </svg>

                Booking Requests
            </a>

            <a href="/myBookings"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">

                <!-- Bookings / Calendar Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>

                My Bookings
            </a>

            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">

                <!-- Ride History Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7h8M8 11h8M9 17h6M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
                </svg>

                Ride History
            </a>

            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">

                <!-- Payments Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 7h18M3 7a2 2 0 012-2h14a2 2 0 012 2M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7"/>
                </svg>

                Payments
            </a>

            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">

                <!-- Settings Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 6v2m0 8v2m6-6h2M4 12H2m15.364-6.364l-1.414 1.414M6.05 17.95l-1.414 1.414m12.728 0l-1.414-1.414M6.05 6.05L4.636 4.636"/>
                </svg>

                Settings
            </a>

        </nav>

        <div class="mt-auto p-4">

            <a onclick="logout()" href="#" class="flex items-center justify-center gap-2 w-full py-3 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-500 font-semibold">

                Logout

            </a>

        </div>

    </aside>

</div>
</body>

</html>
