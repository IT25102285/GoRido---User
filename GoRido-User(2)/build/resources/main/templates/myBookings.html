<!doctype html>

<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Bookings | GoRido</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = { darkMode: "class" };

    </script>

    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
            rel="stylesheet" />

    <style>
        h1,

        h2,

        h3,

        h4,

        .brand {

          font-family: "Outfit", sans-serif;

        }



        .glass {

          background: rgba(15, 23, 42, 0.72);

          backdrop-filter: blur(18px);

        }



        .card-hover {

          transition: 0.25s ease;

        }



        .card-hover:hover {

          transform: translateY(-4px);

        }

    </style>

</head>

<body
        class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-white">

<div class="min-h-screen flex">

    <!-- Sidebar -->

    <div th:replace="~{sidebar :: sidebar}"></div>

    <!-- Main Area -->

    <main class="flex-1 lg:ml-72">

        <!-- Top Bar -->

        <header
                class="sticky top-0 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur border-b border-slate-200 dark:border-slate-800">

            <div
                    class="px-5 sm:px-8 py-4 flex items-center justify-between">

                <div>

                    <h2 class="text-xl sm:text-2xl font-bold">My Booking</h2>

                    <p
                            class="text-sm text-slate-500 dark:text-slate-400">
                        Manage your upcoming events
                    </p>

                </div>

            </div>

        </header>

        <section class="p-5 sm:p-8 space-y-8">

            <div class="flex items-center justify-between w-full">

                <!-- Breadcrumbs (LEFT) -->
                <nav
                        class="text-xs text-slate-400 dark:text-slate-500 flex items-center flex-wrap">
                    <a href="/userprofile"
                       class="hover:text-yellow-400 transition">Home</a>

                    <span class="mx-2">/</span>

                    <span
                            class="text-slate-300 dark:text-slate-200 font-medium">
                                My Bookings
                            </span>
                </nav>

            </div>

            <!-- Recent Rides -->

            <div
                    class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-lg border border-slate-200 dark:border-slate-950 space-y-6">

                <div onclick="window.location.href='/bookHire'"
                     class="vehicle-card bg-white dark:bg-slate-900
            rounded-2xl overflow-hidden
            border-2 border-dashed border-yellow-400/50
            hover:border-yellow-500
            hover:bg-yellow-50 dark:hover:bg-slate-800
            transition cursor-pointer
            flex flex-col items-center justify-center py-10">

                    <!-- ICON -->
                    <div
                            class="w-14 h-14 rounded-xl
               bg-yellow-100 dark:bg-yellow-900/30
               flex items-center justify-center mb-3">

                        <svg class="w-6 h-6 text-yellow-500"
                             fill="none"
                             stroke="currentColor"
                             viewBox="0 0 24 24">
                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M12 4v16m8-8H4" />
                        </svg>
                    </div>

                    <!-- TEXT -->
                    <h3
                            class="text-sm font-semibold text-slate-800 dark:text-white">
                        New Ride
                    </h3>

                    <p
                            class="text-xs text-slate-500 dark:text-slate-400 mt-1">
                        Click to create a new booking
                    </p>

                </div>

                <div th:each="h : ${hires}" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 shadow-md">

                    <!-- HEADER -->
                    <div class="flex items-center justify-between">
                        <h3
                                class="text-white font-semibold text-sm">Hire No. <span th:text="${h.id}"></span></h3>

                        <!-- STATUS BADGE (modern pill) -->
                        <span
                                class="flex items-center gap-1 text-[10px] px-3 py-1 rounded-full
                     bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">
                                    ● <span th:text="${h.hireStatus.name}"></span>
                                </span>
                    </div>

                    <!-- DATE -->
                    <p class="text-[10px] text-slate-400 mt-1" th:text="${#dates.format(h.requested_at, 'dd MMM yyyy · hh:mm a')}">
                    </p>

                    <!-- ROUTE -->
                    <div class="mt-4 flex gap-3">

                        <!-- LINE -->
                        <div class="flex flex-col items-center mt-1">
                            <div
                                    class="w-2 h-2 bg-green-500 rounded-full"></div>
                            <div
                                    class="w-[2px] h-10 bg-slate-700"></div>
                            <div
                                    class="w-2 h-2 bg-red-500 rounded-full"></div>
                        </div>

                        <!-- LOCATIONS -->
                        <div class="flex-1">

                            <p
                                    class="text-[11px] text-slate-400">Pickup</p>
                            <p th:text="${h.pickup_location}" class="text-sm text-white"></p>

                            <div class="h-2"></div>

                            <p
                                    class="text-[11px] text-slate-400">Destination</p>
                            <p th:text="${h.drop_location}"
                                    class="text-base font-semibold text-white">
                            </p>

                        </div>

                    </div>

                    <!-- HIRE DATE -->
                    <div
                            class="mt-4 bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2">
                        <p class="text-[10px] text-slate-400">Hire
                            Duration</p>
                        <p class="text-sm font-semibold text-white">
    <span th:if="${h.duration < 24}"
          th:text="${h.duration + ' Hours'}"></span>

                            <span th:if="${h.duration >= 24}"
                                  th:text="${(h.duration / 24).intValue()} + ' Days'"></span>
                        </p>
                    </div>

                    <!-- INFO ROW -->
                    <div
                            class="flex items-center justify-between mt-4 text-sm">

                        <!-- VEHICLE -->
                        <div>
                            <p
                                    class="text-[10px] text-slate-400">Driver</p>
                            <p th:if="${h.hireStatus.id == 1}"
                               class="text-white font-medium">
                                -
                            </p>

                            <p th:if="${h.hireStatus.id == 2}"
                               class="text-white font-medium"
                               th:text="${h.driver.userId.first_name + ' ' + h.driver.userId.last_name}">
                            </p>
                        </div>

                        <!-- PRICE -->
                        <div class="text-right">
                            <p
                                    class="text-[10px] text-slate-400">Price</p>
                            <p class="text-green-400 font-semibold">
                                LKR 3,200
                            </p>
                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>
<script src="/Js/userprofile.js"></script>
<script src="/Js/default.js"></script>
</body>

</html>
