<!doctype html>

<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>User Dashboard | GoRido</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = { darkMode: "class" };

    </script>

    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
            rel="stylesheet" />

    <style>
        h1,

        h2,

        h3,

        h4,

        .brand {

          font-family: "Outfit", sans-serif;

        }



        .glass {

          background: rgba(15, 23, 42, 0.72);

          backdrop-filter: blur(18px);

        }



        .card-hover {

          transition: 0.25s ease;

        }



        .card-hover:hover {

          transform: translateY(-4px);

        }

    </style>

</head>

<body
        class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-white">

<div class="min-h-screen flex">

    <!-- Sidebar -->

    <div th:replace="~{sidebar :: sidebar}"></div>

    <!-- Main Area -->

    <main class="flex-1 lg:ml-72">

        <!-- Top Bar -->

        <header
                class="sticky top-0 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur border-b border-slate-200 dark:border-slate-800">

            <div
                    class="px-5 sm:px-8 py-4 flex items-center justify-between">

                <div>

                    <h2 class="text-xl sm:text-2xl font-bold">Manage
                        Vehicles</h2>

                    <p
                            class="text-sm text-slate-500 dark:text-slate-400">
                        Welcome back, <span class="capitalize"
                                            th:text="${user.first_name}"></span> 👋
                    </p>

                </div>

            </div>

        </header>

        <section class="p-5 sm:p-8 space-y-8">

            <div class="flex items-center justify-between w-full">

                <!-- Breadcrumbs (LEFT) -->
                <nav class="text-xs text-slate-400 dark:text-slate-500 flex items-center flex-wrap">
                    <a href="/index" class="hover:text-yellow-400 transition">Home</a>

                    <span class="mx-2">/</span>

                    <a href="/profile" class="hover:text-yellow-400 transition">User Profile</a>

                    <span class="mx-2">/</span>

                    <span class="text-slate-300 dark:text-slate-200 font-medium">Manage Vehicle</span>
                </nav>

            </div>

            <!-- Recent Rides -->

            <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-lg border border-slate-200 dark:border-slate-950 space-y-6">

                <!-- Vehicle 2 — Inactive -->
                <div th:each="vehicle : ${vehicles}" class="relative bg-slate-950
            border border-slate-700 rounded-3xl p-6 shadow-lg">
                    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
                        <div class="flex items-center gap-3">
                            <div
                                    class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-700 flex items-center justify-center">
                                <svg class="w-5 h-5 text-slate-400"
                                     fill="none" stroke="currentColor"
                                     viewBox="0 0 24 24"><path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M3 7h18M3 7l2-3h14l2 3M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M9 17v-4m6 4v-4" /></svg>
                            </div>
                            <div>
                                <h3 th:text="${vehicle.number}" class="font-bold text-slate-800 dark:text-white"></h3>
                                <p class="text-xs text-slate-500 dark:text-slate-400"><span class="capitalize" th:text="${vehicle.typeHasBrand.vehicleBrand.name}"></span> <span class="capitalize" th:text="${vehicle.model}"></span> · <span class="capitalize" th:text="${vehicle.typeHasBrand.vehicleType.name}"></span></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button th:if="${vehicle.statusId.id == 1}"
                                    th:attr="data-number=${vehicle.number}"
                                    onclick="changeStatus(this)"
                                    class="px-4 py-1.5 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 transition font-medium shadow-sm flex items-center gap-2">

                                <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
                                Active
                            </button>

                            <button th:if="${vehicle.statusId.id == 2}"
                                    th:attr="data-number=${vehicle.number}"
                                    onclick="changeStatus(this)"
                                    class="px-4 py-1.5 rounded-full bg-gradient-to-r from-yellow-500 to-orange-500 transition font-medium shadow-sm flex items-center gap-2">

                                <span class="w-2 h-2 rounded-full bg-white"></span>
                                Deactive
                            </button>
                            <button th:attr="data-number=${vehicle.number}"
                                    onclick="deleteVehicle(this)" class="delete-btn p-2 rounded-lg bg-red-600 hover:bg-red-700 text-white shadow-md hover:scale-105 transition">

                                <svg class="w-4 h-4" fill="none"
                                     stroke="currentColor"
                                     viewBox="0 0 24 24">

                                    <path stroke-linecap="round"
                                          stroke-linejoin="round"
                                          stroke-width="2"
                                          d="M19 7l-1 12a2 2 0 01-2 2H8a2 2 0 01-2-2L5 7m5 4v6m4-6v6M9 7h6m-1-3H10a1 1 0 00-1 1v2h6V5a1 1 0 00-1-1z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="v2-details" class="px-6 py-5">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">
                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">Type</label>
                                    <p th:text="${vehicle.typeHasBrand.vehicleType.name}"
                                       class="text-sm text-white font-semibold mt-1"></p>
                                </div>
                            </div>

                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">
                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">Brand</label>
                                    <p th:text="${vehicle.typeHasBrand.vehicleBrand.name}"
                                       class="text-sm text-white font-semibold mt-1"></p>
                                </div>
                            </div>

                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">
                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">Model</label>
                                    <p th:text="${vehicle.model}"
                                       class="text-sm text-white font-semibold mt-1"></p>
                                </div>
                            </div>

                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">
                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">Colour</label>

                                    <div class="flex items-center gap-2 mt-1">
                                        <div class="w-3 h-3 rounded-full bg-white border border-slate-300"></div>
                                        <span th:text="${vehicle.vehicleColor.name}"
                                              class="text-sm text-white font-semibold"></span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">
                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">Plate No.</label>
                                    <p th:text="${vehicle.number}"
                                       class="text-sm text-white font-semibold mt-1"></p>
                                </div>
                            </div>

                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">
                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">No. of Seats</label>
                                    <p th:text="${vehicle.typeHasPassenger.passengersId.number}"
                                       class="text-sm text-white font-semibold mt-1"></p>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 py-5">
                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">

                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">
                                        Insurance Number
                                    </label>

                                    <p th:text="${vehicle.insurance_number}"
                                       class="text-sm text-white font-semibold mt-1"></p>

                                </div>
                            </div>

                            <div>
                                <div class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5">

                                    <label class="text-[11px] text-slate-400 uppercase tracking-wide">
                                        Expiry Date
                                    </label>

                                    <p th:text="${vehicle.insurance_exp_date}"
                                       class="text-sm text-white font-semibold mt-1"></p>

                                </div>
                            </div>
                        </div>
                        <div  class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label
                                        class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider block mb-2">Vehicle
                                    Photo</label>
                                <div
                                        class="doc-chip border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-3 flex flex-col items-center gap-2">
                                    <div
                                            class="w-9 h-9 rounded-lg bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center">
                                        <svg
                                                class="w-4 h-4 text-yellow-500"
                                                fill="none"
                                                stroke="currentColor"
                                                viewBox="0 0 24 24"><path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                    </div>
                                    <p th:text="${vehicle.vehicle_photo}" class="text-xs font-medium text-slate-700 dark:text-slate-300"></p>
                                    <span class="badge text-green-600 dark:text-green-400">✓
                                                Uploaded</span>
                                </div>
                            </div>
                            <div>
                                <label
                                        class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider block mb-2">Vehicle
                                    Book</label>
                                <div
                                        class="doc-chip border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-3 flex flex-col items-center gap-2">
                                    <div
                                            class="w-9 h-9 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                                        <svg
                                                class="w-4 h-4 text-blue-500"
                                                fill="none"
                                                stroke="currentColor"
                                                viewBox="0 0 24 24"><path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                    </div>
                                    <p th:text="${vehicle.vehicle_book}" class="text-xs font-medium text-slate-700 dark:text-slate-300"></p>
                                    <span class="badge text-green-600 dark:text-green-400">✓
                                                Uploaded</span>
                                </div>
                            </div>
                            <div>
                                <label
                                        class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider block mb-2">Insurance
                                    Doc</label>
                                <div
                                        class="doc-chip border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-3 flex flex-col items-center gap-2">
                                    <div
                                            class="w-9 h-9 rounded-lg bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
                                        <svg
                                                class="w-4 h-4 text-green-500"
                                                fill="none"
                                                stroke="currentColor"
                                                viewBox="0 0 24 24"><path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                                    </div>
                                    <p th:text="${vehicle.insurance_photo}" class="text-xs font-medium text-slate-700 dark:text-slate-300"></p>
                                    <span
                                            class="badge text-green-600 dark:text-green-400">✓
                                                Uploaded</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div onclick="window.location.href='/addvehicle'" class="vehicle-card bg-white dark:bg-slate-900 rounded-2xl overflow-hidden border-2 border-dashed border-yellow-400/50 hover:border-yellow-500 hover:bg-yellow-50 dark:hover:bg-slate-800 transition cursor-pointer flex flex-col items-center justify-center py-10">

                    <!-- Icon -->
                    <div
                            class="w-14 h-14 rounded-xl bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center mb-3">
                        <svg class="w-6 h-6 text-yellow-500"
                             fill="none"
                             stroke="currentColor"
                             viewBox="0 0 24 24">
                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M12 4v16m8-8H4" />
                        </svg>
                    </div>

                    <!-- Text -->
                    <h3 class="text-sm font-semibold text-slate-800 dark:text-white">
                        Add Vehicle
                    </h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">
                        Click to register a new vehicle
                    </p>

                </div>

            </div>

        </section>

    </main>

</div>
<script src="/Js/managevehicle.js"></script>
<script src="/Js/default.js"></script>
</body>

</html>
