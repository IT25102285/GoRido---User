<!doctype html>

<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">

    <head>

        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>User Dashboard | GoRido</title>

        <script src="https://cdn.tailwindcss.com"></script>

        <script>

        tailwind.config = { darkMode: "class" };

    </script>

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
            rel="stylesheet" />

        <style>
        h1,

        h2,

        h3,

        h4,

        .brand {

          font-family: "Outfit", sans-serif;

        }



        .glass {

          background: rgba(15, 23, 42, 0.72);

          backdrop-filter: blur(18px);

        }



        .card-hover {

          transition: 0.25s ease;

        }



        .card-hover:hover {

          transform: translateY(-4px);

        }

    </style>

    </head>

    <body
        class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-white">

        <div class="min-h-screen flex">

            <!-- Sidebar -->

            <div th:replace="~{sidebar :: sidebar}"></div>

            <!-- Main Area -->

            <main class="flex-1 lg:ml-72">

                <!-- Top Bar -->

                <header
                    class="sticky top-0 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur border-b border-slate-200 dark:border-slate-800">

                    <div
                        class="px-5 sm:px-8 py-4 flex items-center justify-between">

                        <div>

                            <h2 class="text-xl sm:text-2xl font-bold">Booking Requests</h2>

                            <p
                                class="text-sm text-slate-500 dark:text-slate-400">
                                Accept or manage new ride booking requests
                            </p>

                        </div>

                    </div>

                </header>

                <section class="p-5 sm:p-8 space-y-8">

                    <div class="flex items-center justify-between w-full">

                        <!-- Breadcrumbs (LEFT) -->
                        <nav
                            class="text-xs text-slate-400 dark:text-slate-500 flex items-center flex-wrap">
                            <a href="/userprofile"
                                class="hover:text-yellow-400 transition">Home</a>

                            <span class="mx-2">/</span>

                            <span
                                class="text-slate-300 dark:text-slate-200 font-medium">
                                Booking Requests
                            </span>
                        </nav>

                    </div>

                    <!-- Recent Rides -->

                    <div
                        class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-lg border border-slate-200 dark:border-slate-950 space-y-6">

                        <div th:each="h : ${hires}"
                            class="relative bg-slate-950
            border border-slate-700 rounded-3xl p-6 shadow-lg ">

                            <!-- LIGHT GLOW -->
                            <div
                                class="absolute -top-10 -right-10 w-40 h-40 bg-blue-500/10 blur-3xl rounded-full"></div>

                            <!-- HEADER -->
                            <div class="flex items-center justify-between">

                                <div>
                                    <h3 class="text-white font-bold text-lg" >Hire No. <span th:text="${h.id}"></span></h3>

                                    <p th:text="${#dates.format(h.requested_at, 'dd MMM yyyy | hh:mm a')}"
                                       class="text-xs text-slate-400 mt-1">
                                    </p>
                                </div>
                            </div>

                            <div class="mt-6">

                                <div class="flex gap-4">

                                    <!-- TIMELINE LINE -->
                                    <div
                                        class="flex flex-col items-center mt-1">
                                        <div
                                            class="w-3 h-3 bg-green-500 rounded-full ring-4 ring-green-500/10"></div>
                                        <div
                                            class="w-[2px] h-12 bg-slate-700"></div>
                                        <div
                                            class="w-3 h-3 bg-red-500 rounded-full ring-4 ring-red-500/10"></div>
                                    </div>

                                    <!-- TEXT CONTENT -->
                                    <div
                                        class="flex flex-col justify-between flex-1">

                                        <!-- PICKUP -->
                                        <div
                                            class="bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3">
                                            <p
                                                class="text-[11px] text-slate-400 uppercase tracking-wide">Pickup</p>
                                            <p th:text="${h.pickup_location}"
                                                class="text-sm text-white font-semibold mt-1" >
                                            </p>
                                        </div>

                                        <!-- SPACING -->
                                        <div class="h-3"></div>

                                        <!-- DROP -->
                                        <div
                                            class="bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3">
                                            <p
                                                class="text-[11px] text-slate-400 uppercase tracking-wide">Drop-off</p>
                                            <p th:text="${h.drop_location}" class="text-sm text-white font-semibold mt-1">
                                            </p>
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- HIRE DATE SECTION -->
                            <div class="mt-5 grid grid-cols-2 gap-4">

                                <div
                                    class="bg-slate-800/60 border border-slate-700 rounded-xl p-3">
                                    <p
                                        class="text-[10px] text-slate-400 uppercase">Hire
                                        Start</p>
                                    <p th:text="${#temporals.format(h.starting_at, 'dd MMM yyyy | hh:mm a')}"
                                       class="text-sm font-semibold text-white">
                                    </p>
                                </div>

                                <div
                                    class="bg-slate-800/60 border border-slate-700 rounded-xl p-3">
                                    <p
                                        class="text-[10px] text-slate-400 uppercase">Hire
                                        Duration</p>
                                    <p class="text-sm font-semibold text-white">
    <span th:if="${h.duration < 24}"
          th:text="${h.duration + ' Hours'}"></span>

                                        <span th:if="${h.duration >= 24}"
                                              th:text="${(h.duration / 24).intValue()} + ' Days'"></span>
                                    </p>
                                </div>

                            </div>

                            <!-- EXTRA INFO -->
                            <div class="grid grid-cols-3 gap-3 mt-5">

                                <div
                                    class="bg-slate-800/60 rounded-xl p-3 text-center">
                                    <p
                                        class="text-[10px] text-slate-400 uppercase">Distance</p>
                                    <p class="text-sm font-semibold text-white"> <span th:text="${h.distance}"></span>
                                        km</p>
                                </div>

                                <div
                                    class="bg-slate-800/60 rounded-xl p-3 text-center">
                                    <p
                                        class="text-[10px] text-slate-400 uppercase">Passengers</p>
                                    <p class="text-sm font-semibold text-white" th:text="${h.typeHasPassenger.passengersId.number}"></p>
                                </div>

                                <div
                                    class="bg-slate-800/60 rounded-xl p-3 text-center">
                                    <p
                                        class="text-[10px] text-slate-400 uppercase">Vehicle Type</p>
                                    <p class="text-sm font-semibold text-white" th:text="${h.typeHasPassenger.vehicleType.name}"></p>
                                </div>

                            </div>

                            <!-- FOOTER -->
                            <div class="flex items-center justify-between mt-6">

                                <!-- CUSTOMER -->
                                <div>
                                    <p
                                        class="text-xs text-slate-400">Customer</p>
                                    <p class="text-sm text-white font-medium" >
                                        <span class="capitalize" th:text="${h.user.first_name}"></span> <span class="capitalize" th:text="${h.user.last_name}"></span>
                                    </p>
                                </div>

                                <!-- PRICE -->
                                <p
                                    class="text-lg font-bold bg-gradient-to-r from-green-400 to-emerald-500
                  bg-clip-text text-transparent" >
                                    LKR <span th:text="${h.total_fare}"></span>
                                </p>

                            </div>

                            <!-- ACTION BUTTONS -->
                            <div class="flex gap-3 mt-6">

                                <button th:attr="data-id=${h.id}"
                                        onclick="acceptBooking(this)"
                                        class="flex-1 py-2 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-medium shadow-md">
                                    Accept
                                </button>

                            </div>

                        </div>

                    </div>

                </section>

            </main>

        </div>
        <script src="/Js/userprofile.js"></script>
        <script src="/Js/bookingRequests.js"></script>
        <script src="/Js/default.js"></script>
    </body>

</html>
